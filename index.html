<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dự đoán khí hậu Việt Nam</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
}
#map { width: 50%; }
#panel {
  width: 50%;
  padding: 20px;
  background: linear-gradient(135deg,#1e90ff,#87cefa);
  color: white;
  overflow-y: auto;
}
input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}
button {
  background: #32cd32;
  color: white;
}
#result {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
}
canvas {
  background: white;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
<h2>Dự đoán CO₂ & Nhiệt độ (34 tỉnh)</h2>

<input list="provinceList" id="provinceInput" placeholder="Nhập tỉnh (không cần dấu)">
<datalist id="provinceList"></datalist>

<input type="number" id="initialCO2" value="420">
<input type="number" id="currentTemp" value="25">
<input type="number" id="years" value="5">

<button onclick="calculate()">Dự đoán</button>

<div id="result"></div>
<canvas id="chart"></canvas>
</div>

<script>

// ===== DATA 34 TỈNH =====
const co2Data = {
  "Tuyên Quang":[22.2,105.2,414],
  "Cao Bằng":[22.7,106.2,415],
  "Lai Châu":[22.4,103.5,412],
  "Lào Cai":[22.5,104.0,415],
  "Thái Nguyên":[21.6,105.8,419],
  "Điện Biên":[21.4,103.0,413],
  "Lạng Sơn":[21.8,106.7,417],
  "Sơn La":[21.3,103.9,414],
  "Phú Thọ":[21.3,105.2,419],
  "Bắc Ninh":[21.2,106.1,420],
  "Quảng Ninh":[21.0,107.3,420],
  "Hà Nội":[21.0,105.8,422],

  "Hải Phòng":[20.8,106.7,421],
  "Hưng Yên":[20.6,106.0,422],
  "Ninh Bình":[20.2,105.9,420],

  "Thanh Hóa":[19.8,105.8,419],
  "Nghệ An":[19.2,104.9,419],
  "Hà Tĩnh":[18.3,105.9,419],

  "Quảng Trị":[16.7,107.1,418],
  "Huế":[16.5,107.6,418],

  "Đà Nẵng":[16.0,108.2,419],
  "Quảng Ngãi":[15.1,108.8,419],
  "Gia Lai":[13.8,108.1,417],

  "Khánh Hòa":[12.2,109.2,419],
  "Lâm Đồng":[11.5,108.1,420],
  "Đắk Lắk":[12.7,108.2,420],

  "Đồng Nai":[10.9,106.8,431],
  "TP Hồ Chí Minh":[10.8,106.7,430],

  "Tây Ninh":[11.3,106.1,426],
  "Cần Thơ":[10.0,105.7,427],

  "Vĩnh Long":[10.2,105.9,425],
  "Đồng Tháp":[10.5,105.7,424],

  "An Giang":[10.5,105.1,426],
  "Cà Mau":[9.1,105.1,422]
};

// ===== NORMALIZE =====
function normalize(str){
  return str.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/đ/g,"d");
}

const provinceMap = {};
for(let p in co2Data){
  provinceMap[normalize(p)] = p;
}

// ===== LOAD LIST =====
const datalist = document.getElementById("provinceList");
for(let p in co2Data){
  let o = document.createElement("option");
  o.value = p;
  datalist.appendChild(o);
}

// ===== MAP =====
const map = L.map('map').setView([16,106],6);

// tile đẹp hơn
L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// marker đẹp
const marker = L.circleMarker([16,106], {
  radius: 10,
  color: "red",
  fillColor: "#f03",
  fillOpacity: 0.5
}).addTo(map);

// click map
map.on("click", function(e){
  let min=999, selected=null;

  for(let p in co2Data){
    let [lat,lng]=co2Data[p];
    let d=Math.sqrt((lat-e.latlng.lat)**2+(lng-e.latlng.lng)**2);
    if(d<min){
      min=d;
      selected=p;
    }
  }

  if(selected){
    provinceInput.value=selected;
    initialCO2.value=co2Data[selected][2];

    let [lat,lng]=co2Data[selected];
    map.setView([lat,lng],9);

    marker.setLatLng([lat,lng])
      .bindPopup(selected)
      .openPopup();
  }
});

// input
provinceInput.addEventListener("input",()=>{
  let val=normalize(provinceInput.value);
  if(provinceMap[val]){
    let name=provinceMap[val];
    initialCO2.value=co2Data[name][2];

    let [lat,lng]=co2Data[name];
    map.setView([lat,lng],9);
    marker.setLatLng([lat,lng]);
  }
});

// ===== CALCULATE =====
let chart;

function calculate(){
let T0=parseFloat(currentTemp.value);
let C0=parseFloat(initialCO2.value);
let years=parseInt(document.getElementById("years").value);

if(!T0||!C0||!years){
  result.innerText="Sai dữ liệu!";
  return;
}

let k=2.8, growth=2.2;

let labels=[],temps=[],co2s=[];

for(let i=0;i<=years;i++){
  let Ci=C0+growth*i;
  let Ti=T0+k*Math.log(Ci/C0);

  labels.push("Năm "+i);
  temps.push(Ti);
  co2s.push(Ci);
}

let Tf=temps[temps.length-1];
let Cf=co2s[co2s.length-1];

result.innerText=`CO2: ${Cf.toFixed(1)} ppm | Nhiệt độ: ${Tf.toFixed(2)} °C`;

if(Tf>=30) result.style.background="red";
else if(Tf>=27) result.style.background="orange";
else result.style.background="green";

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels:labels,
    datasets:[
      {label:"Nhiệt độ",data:temps},
      {label:"CO2",data:co2s}
    ]
  }
});
}

</script>

</body>
</html>
